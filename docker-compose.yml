services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build: ./backend
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./trainer:/trainer:ro
      - chroma_data:/chroma_data
    env_file:
      - .env
    environment:
      - MODEL_PATH=/trainer/dog_model.pth
      - CHROMA_PATH=/chroma_data
      - CORS_ORIGINS=http://localhost
      - PYTHONUNBUFFERED=1
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-Pawfound <noreply@pawfound.app>}
      - NOTIFY_THRESHOLD=${NOTIFY_THRESHOLD:-0.70}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
    networks:
      - app_network

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=
      - VITE_API_PROXY_TARGET=http://backend:8000
    networks:
      - app_network

volumes:
  chroma_data:
  postgres_data:

networks:
  app_network:
    driver: bridge
